<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="Untitled-1.css">
  <title>GDG Founders Team</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
      min-height:100vh;
      color:white;
      padding:40px 20px;
    }

    .heading{
      text-align:center;
      margin-bottom:40px;
    }

    .heading h1{
      font-size:3rem;
      margin-bottom:10px;
      color:#38bdf8;
    }

    .heading p{
      color:#cbd5e1;
      font-size:1rem;
    }

    #main{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:25px;
      max-width:1400px;
      margin:auto;
    }

    .card{
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:25px;
      overflow:hidden;
      backdrop-filter: blur(10px);
      transition:0.4s;
      position:relative;
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);
      box-shadow:0 15px 30px rgba(0,0,0,0.4);
    }

    nav{
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      background:#0ea5e9;
      color:white;
      font-weight:bold;
    }

    .inner{
      padding:25px;
      text-align:center;
    }

    .inner img{
      width:130px;
      height:130px;
      object-fit:cover;
      border-radius:50%;
      border:4px solid #38bdf8;
      margin-bottom:18px;
      transition:0.4s;
    }

    .card:hover img{
      transform:scale(1.08);
    }

    .inner h1{
      font-size:1.7rem;
      margin-bottom:8px;
    }

    .inner h3{
      color:#38bdf8;
      margin-bottom:15px;
      font-size:1rem;
    }

    .bio{
      font-size:0.95rem;
      line-height:1.5;
      color:black;
      margin-bottom:20px;
      min-height:90px;
    }

    .email{
      font-size:0.9rem;
      color:#94a3b8;
      margin-bottom:20px;
      word-break:break-word;
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:15px;
      margin-bottom:20px;
    }

    .socials a{
      text-decoration:none;
      padding:10px 18px;
      border-radius:10px;
      font-size:0.9rem;
      font-weight:bold;
      transition:0.3s;
    }

    .github{
      background:#111827;
      color:white;
    }

    .linkedin{
      background:#0a66c2;
      color:white;
    }

    .socials a:hover{
      transform:scale(1.08);
    }

    button{
      padding:12px 25px;
      border:none;
      border-radius:30px;
      background:#38bdf8;
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      background:#0284c7;
      transform:scale(1.05);
    }

    .connected{
      background:green !important;
    }

    @media(max-width:500px){

      .heading h1{
        font-size:2rem;
      }

      .inner h1{
        font-size:1.4rem;
      }

    }
  </style>
</head>

<body>

  <div class="heading">
    <h1>GDG Founders Team</h1>
    <p>Meet the amazing founders and leads of GDG On Campus HIT</p>
  </div>

  <div id="main"></div>
  <script src="javaa.js"></script>



</body>
</html>
